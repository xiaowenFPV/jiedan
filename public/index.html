<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲行动俱乐部接单平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e17;color:#e0e0e0;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:16px;padding-bottom:90px}

.nav{display:flex;justify-content:space-around;background:#111827;padding:12px 8px;position:fixed;bottom:0;left:0;right:0;z-index:100;border-top:1px solid #1e293b}
.nav-btn{color:#64748b;border:none;background:none;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:#3b82f6}

.card{background:#111827;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #1e293b}
.card h3{font-size:15px;margin-bottom:10px;color:#f1f5f9}

.btn{display:inline-block;padding:10px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer}
.btn-primary{background:#3b82f6;color:#fff;width:100%}
.btn-success{background:#10b981;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-warning{background:#f59e0b;color:#000}
.btn-outline{border:1px solid #334155;background:transparent;color:#e0e0e0}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:0.4;cursor:not-allowed}

.input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e0e0e0;font-size:14px}
.input:focus{outline:none;border-color:#3b82f6}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:4px;margin-top:10px}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-unpaid{background:#92400e;color:#fcd34d}
.badge-pending{background:#334155;color:#94a3b8}
.badge-accepted{background:#1e40af;color:#93c5fd}
.badge-completed{background:#b45309;color:#fde68a}
.badge-settled{background:#166534;color:#86efac}
.badge-cancelled{background:#7f1d1d;color:#fca5a5}

.type-card{border:2px solid #1e293b;border-radius:12px;padding:14px;cursor:pointer;margin-bottom:8px}
.type-card.selected{border-color:#3b82f6;background:#1e3a5f}
.type-card .name{font-size:17px;font-weight:700;color:#f1f5f9}
.type-card .detail{font-size:13px;color:#94a3b8;margin-top:4px}
.type-card .price{font-size:20px;font-weight:700;color:#3b82f6;margin-top:8px}

.order-item{background:#1a2332;border-radius:10px;padding:14px;margin-bottom:10px;border-left:3px solid #334155}
.order-item.accepted{border-left-color:#3b82f6}
.order-item.completed{border-left-color:#f59e0b}
.order-item.settled{border-left-color:#10b981}
.order-item.cancelled{border-left-color:#ef4444}
.order-item .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-item .type{font-weight:700;font-size:15px;color:#f1f5f9}
.order-item .info{font-size:12px;color:#94a3b8;line-height:1.8}
.order-item .info .fee-row{color:#f59e0b}
.order-item .info .dashi-row{color:#10b981}
.order-item .actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#111827;border-radius:16px;padding:24px;width:100%;max-width:400px;text-align:center;border:1px solid #1e293b}
.modal h2{font-size:18px;margin-bottom:16px;color:#f1f5f9}

.tabs{display:flex;gap:4px;margin-bottom:16px;background:#0f172a;border-radius:10px;padding:4px}
.tab{padding:8px 16px;border-radius:8px;border:none;background:none;color:#64748b;font-size:13px;cursor:pointer;flex:1}
.tab.active{background:#1e293b;color:#f1f5f9}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:13px;z-index:300;color:#fff}
.toast-success{background:#059669}
.toast-error{background:#dc2626}
.toast-info{background:#2563eb}

.qty-control{display:flex;align-items:center;gap:0}
.qty-control button{width:40px;height:40px;font-size:20px;background:#1e293b;border:1px solid #334155;color:#e0e0e0;cursor:pointer}
.qty-control button:first-child{border-radius:8px 0 0 8px}
.qty-control button:last-child{border-radius:0 8px 8px 0}
.qty-control .qty-input{width:60px;height:40px;text-align:center;font-size:16px;border:1px solid #334155;border-left:none;border-right:none;background:#0f172a;color:#fff;font-weight:700}

.admin-table{width:100%;font-size:12px;border-collapse:collapse}
.admin-table th{text-align:left;color:#94a3b8;padding:6px 4px;border-bottom:1px solid #1e293b}
.admin-table td{padding:6px 4px;border-bottom:1px solid #0f172a}

.hidden{display:none!important}
.tip{padding:40px 0;text-align:center;color:#475569;font-size:14px}
.total{font-size:28px;font-weight:700;color:#3b82f6;text-align:center;margin:16px 0}

.fee-breakdown{background:#0f172a;border-radius:8px;padding:12px;margin:12px 0;font-size:13px;line-height:2.2}
.fee-breakdown .label{color:#94a3b8}
.fee-breakdown .val{float:right;font-weight:600}
.fee-breakdown .deduct{color:#f59e0b}
.fee-breakdown .income{color:#10b981}

.qr-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px}
.pay-timer{color:#f59e0b;font-size:13px;margin-top:8px}
.pay-methods{display:flex;gap:12px;margin-bottom:16px}
.pay-method{cursor:pointer;border:2px solid #334155;border-radius:10px;padding:12px 20px;text-align:center;font-size:14px;font-weight:600;transition:all .2s;flex:1}
.pay-method:hover{border-color:#3b82f6}
.pay-method.selected{border-color:#3b82f6;background:#1e3a5f;color:#60a5fa}
.pay-method .pay-icon{font-size:24px;margin-bottom:4px}
</style>
</head>
<body>

<div id="loginPage"></div>
<div id="appPage" class="hidden">
  <div class="container" id="pageContent"></div>
  <div class="nav" id="navBar"></div>
</div>
<div id="toastContainer"></div>
<div id="modalContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
function loadUser() { try { const u = localStorage.getItem('user'); return u ? JSON.parse(u) : null; } catch (_) { return null; } }
function saveUser(u) { if (u) localStorage.setItem('user', JSON.stringify(u)); else localStorage.removeItem('user'); }
const STATE = {
    token: localStorage.getItem('token') || null,
    user: loadUser(),
    page: localStorage.getItem('page') || 'home',
    services: null,
    orders: [],
    pollingTimer: null
};
const API = '';

async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (STATE.token) headers['Authorization'] = 'Bearer ' + STATE.token;
    const res = await fetch(API + path, { headers, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '请求失败');
    return data;
}

function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

function showModal(html) {
    document.getElementById('modalContainer').innerHTML = '<div class="modal-overlay" id="modalOverlay" onclick="if(event.target.id===\'modalOverlay\')closeModal()"><div class="modal">' + html + '</div></div>';
}
function closeModal() {
    if (STATE.pollingTimer) { clearInterval(STATE.pollingTimer); STATE.pollingTimer = null; }
    document.getElementById('modalContainer').innerHTML = '';
}

function render() {
    if (!STATE.token || !STATE.user) {
        document.getElementById('loginPage').style.display = '';
        document.getElementById('appPage').classList.add('hidden');
        renderLogin();
        return;
    }
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').classList.remove('hidden');
    renderNav();
    if (STATE.page === 'admin') loadAdmin();
    else if (STATE.page === 'orders') loadOrders();
    else loadHome();
}

function renderLogin() {
    const remembered = STATE.user;
    const tip = remembered ? '<div style="background:#1e293b;border:1px solid #334155;color:#fbbf24;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px">会话已过期，请重新登录。<br>欢迎回来，<b>' + remembered.name + '</b></div>' : '';
    const lp = document.getElementById('loginPage');
    lp.innerHTML = `<div class="container" style="text-align:center;padding-top:60px">
        <h1 style="font-size:22px;color:#f1f5f9;margin-bottom:6px">三角洲行动俱乐部</h1>
        <p style="color:#64748b;font-size:13px;margin-bottom:30px">打手接单 · 顾客派单 · 安全支付</p>
        <div class="card" style="text-align:left">
            ${tip}
            <div id="loginTabs" class="tabs">
                <button class="tab active" onclick="switchLoginTab('login')">登录</button>
                <button class="tab" onclick="switchLoginTab('register')">注册</button>
            </div>
            <div id="loginForm"></div>
            <div style="text-align:center;margin-top:10px">
                <button class="btn btn-outline btn-sm" onclick="showAdminKey()">管理员入口</button>
            </div>
        </div>
    </div>`;
    switchLoginTab('login');
}

function switchLoginTab(tab) {
    const ct = document.getElementById('loginTabs');
    const tabs = ct.querySelectorAll('.tab');
    if (tabs.length) tabs.forEach((t, i) => t.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
    const saved = STATE.user;
    if (tab === 'login') {
        document.getElementById('loginForm').innerHTML = `
            <label>角色</label><select id="loginRole" class="input"><option value="guke"${saved&&saved.role==='guke'?' selected':''}>顾客</option><option value="dashi"${saved&&saved.role==='dashi'?' selected':''}>打手</option></select>
            <label>用户名</label><input id="loginName" class="input" placeholder="请输入用户名" value="${saved ? saved.name : ''}">
            <label>密码</label><input id="loginPass" class="input" type="password" placeholder="请输入密码">
            <label>安全码（打手必填）</label><input id="loginSafety" class="input" type="password" placeholder="安全码">
            <button class="btn btn-primary" style="margin-top:14px" onclick="doLogin()">登录</button>`;
    } else {
        document.getElementById('loginForm').innerHTML = `
            <label>角色</label><select id="regRole" class="input" onchange="document.getElementById('regSafetyWrap').style.display=this.value==='dashi'?'':'none'"><option value="guke">顾客</option><option value="dashi">打手</option></select>
            <label>用户名</label><input id="regName" class="input" placeholder="请输入用户名">
            <label>密码</label><input id="regPass" class="input" type="password" placeholder="至少4位">
            <div id="regSafetyWrap"><label>安全码（打手必填）</label><input id="regSafety" class="input" type="password" placeholder="安全码"></div>
            <button class="btn btn-primary" style="margin-top:14px" onclick="doRegister()">注册</button>`;
    }
}

async function doLogin() {
    const role = document.getElementById('loginRole').value;
    const name = document.getElementById('loginName').value.trim();
    const pass = document.getElementById('loginPass').value;
    try {
        const body = { name, password: pass, role };
        if (role === 'dashi') body.safetyCode = document.getElementById('loginSafety').value;
        const data = await api('/api/login', { method: 'POST', body });
        STATE.token = data.token; STATE.user = data.user;
        localStorage.setItem('token', data.token); saveUser(data.user);
        render(); toast('登录成功', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function doRegister() {
    const role = document.getElementById('regRole').value;
    const name = document.getElementById('regName').value.trim();
    const pass = document.getElementById('regPass').value;
    try {
        const body = { name, password: pass, role };
        if (role === 'dashi') body.safetyCode = document.getElementById('regSafety').value;
        const data = await api('/api/register', { method: 'POST', body });
        STATE.token = data.token; STATE.user = data.user;
        localStorage.setItem('token', data.token); saveUser(data.user);
        render(); toast('注册成功', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function showAdminKey() {
    showModal(`<h2>管理员登录</h2>
        <div style="text-align:left">
            <label>用户名</label><input id="adminName" class="input" placeholder="管理员名称">
            <label>管理员密钥</label><input id="adminKey" class="input" type="password" placeholder="密钥">
            <button class="btn btn-primary" style="margin-top:14px" onclick="doAdminLogin()">登录</button>
        </div>`);
}

async function doAdminLogin() {
    const name = document.getElementById('adminName').value.trim() || '管理员';
    try {
        const data = await api('/api/login', { method: 'POST', body: { name, password: '', role: 'admin', adminKey: document.getElementById('adminKey').value } });
        STATE.token = data.token; STATE.user = data.user;
        localStorage.setItem('token', data.token); saveUser(data.user);
        closeModal(); STATE.page = 'admin'; render(); toast('管理员登录成功', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

function renderNav() {
    const nav = document.getElementById('navBar');
    let btns = [{ page: 'home', label: '首页' }, { page: 'orders', label: '我的订单' }];
    if (STATE.user.role === 'admin') btns = [{ page: 'admin', label: '管理' }];
    btns.push({ page: 'logout', label: '退出' });
    nav.innerHTML = btns.map(b =>
        b.page === 'logout' ? '<button class="nav-btn" onclick="doLogout()">' + b.label + '</button>' :
        '<button class="nav-btn' + (STATE.page === b.page ? ' active' : '') + '" onclick="changePage(\'' + b.page + '\')">' + b.label + '</button>'
    ).join('');
}

function changePage(p) { STATE.page = p; localStorage.setItem('page', p); render(); }

async function doLogout() {
    try { await api('/api/logout', { method: 'POST' }); } catch (_) {}
    STATE.token = null; STATE.user = null; localStorage.removeItem('token'); saveUser(null);
    document.getElementById('loginPage').style.display = '';
    document.getElementById('appPage').classList.add('hidden');
}

// ============ 顾客首页 ============
async function loadHome() {
    const pc = document.getElementById('pageContent');
    pc.innerHTML = '<div class="tip">加载中...</div>';
    try {
        STATE.services = await api('/api/types');
        if (STATE.user.role === 'guke') renderGukeHome();
        else if (STATE.user.role === 'dashi') await renderDashiHome();
        else renderGukeHome();
    } catch (e) { pc.innerHTML = '<div class="tip">加载失败：' + e.message + '</div>'; }
}

function renderGukeHome() {
    const pc = document.getElementById('pageContent');
    pc.innerHTML = `
        <div class="card"><h3>欢迎，${STATE.user.name}</h3><p style="color:#64748b;font-size:13px">顾客</p></div>
        <div class="card"><h3>选择服务类型</h3><div id="typeList"></div><div id="orderForm" class="hidden"></div></div>`;
    document.getElementById('typeList').innerHTML = STATE.services.map(t => `
        <div class="type-card" id="type_${t.id}" onclick="selectType('${t.id}')">
            <div class="name">${t.name}</div><div class="detail">${t.unitPrice}元 / ${t.unitAmount}</div><div class="price">¥${t.unitPrice}</div>
        </div>`).join('');
}

function selectType(typeId) {
    const st = STATE.services.find(s => s.id === typeId);
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('type_' + typeId).classList.add('selected');
    const of = document.getElementById('orderForm');
    of.classList.remove('hidden');
    of.innerHTML = `
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #1e293b">
            <label>${st.name}数量</label>
            <div class="qty-control" style="margin-bottom:10px">
                <button onclick="changeQty(-1)">-</button>
                <input class="qty-input" id="orderQty" value="1" oninput="onQtyInput()" type="number" min="1" max="100">
                <button onclick="changeQty(1)">+</button>
            </div>
            <div class="total">¥<span id="totalPrice">${st.unitPrice}</span></div>
            <div class="fee-breakdown">
                <div><span class="label">商品金额</span><span class="val" id="fbAmount">¥${st.unitPrice}</span></div>
                <div><span class="label">平台服务费（15%）</span><span class="val deduct" id="fbPlatform">-¥${(st.unitPrice*0.15).toFixed(2)}</span></div>
                <div><span class="label">支付手续费（0.6%）</span><span class="val deduct" id="fbAlipay">-¥${(st.unitPrice*0.006).toFixed(2)}</span></div>
                <div style="border-top:1px solid #1e293b;margin-top:4px;padding-top:4px"><span class="label">打手所得（84.4%）</span><span class="val income" id="fbDashi">¥${(st.unitPrice*0.844).toFixed(2)}</span></div>
            </div>
            <label>游戏ID <span style="color:#ef4444">*</span></label>
            <input id="gameId" class="input" placeholder="请输入游戏内ID">
            <label>备注</label><input id="note" class="input" placeholder="选填">
            <button class="btn btn-primary" style="margin-top:16px" onclick="submitOrder('${typeId}')">确认下单 ¥<span id="btnPrice">${st.unitPrice}</span></button>
        </div>`;
}

function changeQty(d) { const e = document.getElementById('orderQty'); e.value = Math.max(1, Math.min(100, (parseInt(e.value) || 1) + d)); updateTotal(); }
function onQtyInput() { const e = document.getElementById('orderQty'); e.value = Math.max(1, Math.min(100, parseInt(e.value) || 1)); updateTotal(); }

function updateTotal() {
    const sel = document.querySelector('.type-card.selected');
    if (!sel) return;
    const st = STATE.services.find(s => s.id === sel.id.replace('type_', ''));
    const qty = parseInt(document.getElementById('orderQty').value) || 1;
    const total = st.unitPrice * qty;
    document.getElementById('totalPrice').textContent = total;
    document.getElementById('fbAmount').textContent = '¥' + total;
    document.getElementById('fbPlatform').textContent = '-¥' + (total * 0.15).toFixed(2);
    document.getElementById('fbAlipay').textContent = '-¥' + (total * 0.006).toFixed(2);
    document.getElementById('fbDashi').textContent = '¥' + (total * 0.844).toFixed(2);
    document.getElementById('btnPrice').textContent = total;
}

async function submitOrder(typeId) {
    const qty = parseInt(document.getElementById('orderQty').value) || 1;
    const gameId = document.getElementById('gameId').value.trim();
    const note = document.getElementById('note').value.trim();
    if (!gameId) return toast('请输入游戏ID', 'error');
    try {
        const order = await api('/api/orders', { method: 'POST', body: { typeId, quantity: qty, gameId, note } });
        document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('orderForm').classList.add('hidden');
        showPayModal(order);
    } catch (e) { toast(e.message, 'error'); }
}

async function showPayModal(order) {
    showModal('<h2>选择支付方式</h2>'
        + '<div class="pay-methods">'
        + '<div class="pay-method selected" id="pmAlipay" onclick="selectPayMethod(\'alipay\')"><div class="pay-icon">&#x1f4f1;</div>支付宝</div>'
        + '<div class="pay-method" id="pmWxpay" onclick="selectPayMethod(\'wxpay\')"><div class="pay-icon">&#x1f4f1;</div>微信支付</div>'
        + '</div>'
        + '<div class="qr-wrapper hidden" id="qrWrapper"><div id="qrCode"></div><div class="total">¥' + order.totalPrice.toFixed(2) + '</div><div class="pay-timer">请扫码支付</div></div>'
        + '<button class="btn btn-primary" style="margin-top:16px;width:100%" id="btnCreatePay" onclick="createPayment(' + order.id + ')">生成二维码</button>'
        + '<button class="btn btn-outline btn-sm" style="margin-top:8px;width:100%" onclick="cancelPay(' + order.id + ')">取消支付</button>');
    STATE.payType = 'alipay';
}

function selectPayMethod(type) {
    STATE.payType = type;
    document.getElementById('pmAlipay').classList.toggle('selected', type === 'alipay');
    document.getElementById('pmWxpay').classList.toggle('selected', type === 'wxpay');
}

async function createPayment(orderId) {
    const qrWrapper = document.getElementById('qrWrapper');
    const btn = document.getElementById('btnCreatePay');
    btn.disabled = true; btn.textContent = '生成中...';
    try {
        const pr = await api('/api/pay/create', { method: 'POST', body: { orderId, payType: STATE.payType } });
        qrWrapper.classList.remove('hidden');
        btn.style.display = 'none';
        document.getElementById('qrCode').innerHTML = '';
        new QRCode(document.getElementById('qrCode'), { text: pr.payUrl, width: 200, height: 200, colorDark: '#000', colorLight: '#fff' });
        startPolling(orderId);
    } catch (e) { btn.disabled = false; btn.textContent = '生成二维码'; toast(e.message, 'error'); }
}

function startPolling(orderId) {
    STATE.pollingTimer = setInterval(async () => {
        try {
            const s = await api('/api/pay/status/' + orderId, { method: 'POST' });
            if (s.paid) { clearInterval(STATE.pollingTimer); STATE.pollingTimer = null; closeModal(); toast('支付成功！已派发给打手', 'success'); }
        } catch (_) {}
    }, 2000);
}

async function cancelPay(orderId) {
    if (STATE.pollingTimer) { clearInterval(STATE.pollingTimer); STATE.pollingTimer = null; }
    try { await api('/api/orders/' + orderId + '/cancel', { method: 'PUT' }); } catch (_) {}
    closeModal(); toast('已取消', 'info');
}

// ============ 打手首页 ============
async function renderDashiHome() {
    const pc = document.getElementById('pageContent');
    try {
        const pending = await api('/api/orders/pending');
        let html = pending.length === 0 ? '<div class="tip">暂无待接订单</div>' : pending.map(o => `
            <div class="order-item">
                <div class="header"><span class="type">${o.typeName} x${o.quantity}</span><span class="badge badge-pending">待接单</span></div>
                <div class="info">${o.unitAmount}×${o.quantity} | ¥${o.totalPrice}<br>顾客：${o.customerName} | 游戏ID：${o.gameId}<br><span class="dashi-row">打手收入：¥${o.dashiIncome.toFixed(2)}</span><br>${o.note ? '备注：'+o.note+'<br>' : ''}${o.time}</div>
                <div class="actions"><button class="btn btn-success btn-sm" onclick="acceptOrder(${o.id})">接单</button></div>
            </div>`).join('');
        pc.innerHTML = `<div class="card"><h3>欢迎，${STATE.user.name}</h3><p style="color:#64748b;font-size:13px">打手</p></div>
            <div class="card"><h3>待接订单（${pending.length}）</h3><button class="btn btn-outline btn-sm" onclick="loadHome()" style="margin-bottom:10px">刷新</button>${html}</div>`;
    } catch (e) { pc.innerHTML = '<div class="tip">加载失败：' + e.message + '</div>'; }
}

async function acceptOrder(oid) {
    try { await api('/api/orders/' + oid + '/accept', { method: 'PUT' }); toast('接单成功', 'success'); loadHome(); }
    catch (e) { toast(e.message, 'error'); }
}

// ============ 我的订单 ============
async function loadOrders() {
    const pc = document.getElementById('pageContent');
    pc.innerHTML = '<div class="tip">加载中...</div>';
    try {
        STATE.orders = await api('/api/orders/my');
        if (STATE.orders.length === 0) { pc.innerHTML = '<div class="tip">暂无订单</div>'; return; }
        pc.innerHTML = STATE.orders.map(o => {
            let actions = '';
            if (STATE.user.role === 'guke' && o.status === 'unpaid') actions = '<button class="btn btn-primary btn-sm" onclick="continuePay(' + o.id + ')">继续付款</button><button class="btn btn-danger btn-sm" onclick="cancelOrder(' + o.id + ')">取消</button>';
            if (STATE.user.role === 'dashi' && o.status === 'accepted') actions = '<button class="btn btn-success btn-sm" onclick="completeOrder(' + o.id + ')">标记完成</button>';
            let feeHtml = o.status !== 'unpaid' && o.dashiIncome !== undefined ? '<span class="fee-row">平台：¥' + o.platformFee.toFixed(2) + '</span> | <span class="fee-row">手续费：¥' + o.alipayFee.toFixed(2) + '</span> | <span class="dashi-row">打手：¥' + o.dashiIncome.toFixed(2) + '</span><br>' : '';
            const sl = { unpaid: '待付款', pending: '待接单', accepted: '进行中', completed: '待结算', settled: '已结算', cancelled: '已取消' };
            return `<div class="order-item ${o.status}">
                <div class="header"><span class="type">${o.typeName} x${o.quantity}</span><span class="badge badge-${o.status}">${sl[o.status]}</span></div>
                <div class="info">${o.unitAmount}×${o.quantity} | ¥${o.totalPrice.toFixed(2)}<br>游戏ID：${o.gameId}<br>${feeHtml}${o.dashiName ? '打手：'+o.dashiName+'<br>' : ''}${o.note ? '备注：'+o.note+'<br>' : ''}${o.time}${o.paidAt ? '<br>支付：'+o.paidAt : ''}</div>
                ${actions ? '<div class="actions">'+actions+'</div>' : ''}
            </div>`;
        }).join('');
    } catch (e) { pc.innerHTML = '<div class="tip">加载失败：' + e.message + '</div>'; }
}

function continuePay(oid) { const o = STATE.orders.find(o => o.id === oid); if (o) showPayModal(o); }
async function cancelOrder(oid) { try { await api('/api/orders/' + oid + '/cancel', { method: 'PUT' }); toast('已取消', 'success'); loadOrders(); } catch (e) { toast(e.message, 'error'); } }
async function completeOrder(oid) { try { await api('/api/orders/' + oid + '/complete', { method: 'PUT' }); toast('完成，等待结算', 'success'); loadOrders(); } catch (e) { toast(e.message, 'error'); } }

// ============ 管理员 ============
async function loadAdmin() {
    const pc = document.getElementById('pageContent');
    pc.innerHTML = '<div class="tip">加载中...</div>';
    try {
        const [orders, users] = await Promise.all([api('/api/admin/orders'), api('/api/admin/users')]);
        const total = orders.filter(o => o.status !== 'cancelled' && o.status !== 'unpaid').reduce((s, o) => s + (o.totalPrice || 0), 0);
        const oh = orders.length === 0 ? '<div class="tip">无订单</div>' : `<div style="overflow-x:auto"><table class="admin-table">
            <tr><th>ID</th><th>类型</th><th>量</th><th>金额</th><th>顾客</th><th>打手</th><th>打手收入</th><th>状态</th><th>操作</th></tr>
            ${orders.map(o => '<tr><td>'+o.id+'</td><td>'+o.typeName+'</td><td>'+o.quantity+'</td><td>¥'+(o.totalPrice||0).toFixed(2)+'</td><td>'+o.customerName+'</td><td>'+(o.dashiName||'-')+'</td><td>¥'+(o.dashiIncome||0).toFixed(2)+'</td><td>'+({unpaid:'待付',pending:'待接',accepted:'进行中',completed:'待结算',settled:'已结算',cancelled:'已取消'}[o.status]||o.status)+'</td><td>'+(o.status==='completed'?'<button class="btn btn-warning btn-sm" onclick="settleOrder('+o.id+')">结算</button>':'')+'</td></tr>').join('')}
        </table></div>`;
        const uh = users.length === 0 ? '<div class="tip">无用户</div>' : `<div style="overflow-x:auto"><table class="admin-table">
            <tr><th>ID</th><th>名称</th><th>角色</th><th>完成数</th><th>累计收入</th></tr>
            ${users.map(u => '<tr><td>'+u.id+'</td><td>'+u.name+'</td><td>'+(u.role==='dashi'?'打手':'顾客')+'</td><td>'+(u.completedOrders||0)+'</td><td>¥'+(u.totalEarned||0).toFixed(2)+'</td></tr>').join('')}
        </table></div>`;
        pc.innerHTML = `<div class="card"><h3>管理员面板</h3><p style="color:#94a3b8;font-size:12px;margin-bottom:8px">已收款总额：¥${total.toFixed(2)}</p>
            <button class="btn btn-danger btn-sm" onclick="adminCancelAll()" style="margin-right:8px">下架进行中</button>
            <button class="btn btn-danger btn-sm" onclick="adminClearOrders()">清空订单</button></div>
        <div class="card"><h3>全部订单 (${orders.length})</h3>${oh}</div>
        <div class="card"><h3>全部用户 (${users.length})</h3>${uh}</div>`;
    } catch (e) { pc.innerHTML = '<div class="tip">加载失败：' + e.message + '</div>'; }
}

async function settleOrder(oid) {
    if (!confirm('确认已手动转账给打手？')) return;
    try { await api('/api/orders/' + oid + '/settle', { method: 'PUT' }); toast('已结算', 'success'); loadAdmin(); }
    catch (e) { toast(e.message, 'error'); }
}
async function adminCancelAll() {
    if (!confirm('确定下架所有进行中/待接订单？')) return;
    try { const r = await api('/api/admin/orders/cancel-all', { method: 'POST' }); toast(r.msg, 'success'); loadAdmin(); }
    catch (e) { toast(e.message, 'error'); }
}
async function adminClearOrders() {
    if (!confirm('确定清空全部订单？')) return;
    try { await api('/api/admin/clear', { method: 'POST', body: { type: 'orders' } }); toast('已清空', 'success'); loadAdmin(); }
    catch (e) { toast(e.message, 'error'); }
}

// 启动
if (STATE.token) {
    api('/api/user').then(u => { STATE.user = u; saveUser(u); render(); }).catch(() => { STATE.token = null; localStorage.removeItem('token'); render(); });
} else { render(); }
</script>
</body>
</html>
